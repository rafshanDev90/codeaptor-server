version: '3.8'

services:
  app:
    build: .
    container_name: codeaptor-app
    restart: always
    environment:
      - PORT=3000
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI}
      - CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - CLIENT_ORIGIN=${CLIENT_ORIGIN}
    # Port 3000 is exposed internally on the docker network. 
    # Caddy will route external traffic to it, so we don't need to publish port 3000 to the public host.
    expose:
      - "3000"


